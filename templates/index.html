<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TanyaKampus - Chatbot Akademik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="header-info">
            <div class="avatar">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <div>
                <h3>TanyaKampus</h3>
                <p><span class="status-dot"></span> Online • Asisten Akademik</p>
            </div>
        </div>
    </div>

    <div id="chat-box" class="chat-box">
        <div class="message bot-message">
            <div class="bubble">
                Selamat datang di <strong>TanyaKampus</strong>! 👋<br>
                Saya siap membantu menjawab kebingunganmu mengenai istilah perkuliahan umum seperti KRS, KHS, SKS, atau IPK. Silakan tanyakan apa saja!
            </div>
        </div>
    </div>

    <div class="input-area">
        <input 
            type="text" 
            id="user-input" 
            placeholder="Ketik pertanyaanmu di sini (e.g., apa itu KRS?)..."
            autocomplete="off"
        >
        <button id="send-btn" onclick="sendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
